name: Weekly update

# Runs every Monday, and can also be run by hand from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "0 6 * * 1"      # Mondays, 06:00 UTC
  workflow_dispatch: {}

# The job commits data back to the repo and (on failure) opens an issue.
permissions:
  contents: write
  issues: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned on purpose: unpinned "latest" is how a pipeline
      # silently breaks for an owner who cannot read a stack trace.
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the weekly harvest
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python src/harvest.py

      # A commit every run does double duty: it builds the longitudinal history AND
      # keeps GitHub from auto-disabling this schedule after 60 days of no activity.
      - name: Record the run (heartbeat)
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_run.txt

      - name: Commit the updated data
        run: |
          git config user.name "landscape-bot"
          git config user.email "actions@users.noreply.github.com"
          # Stage only the run's outputs (note: NOT a blanket "git add data", which would sweep
          # any stray file dropped into data/ into the public history). -A captures the prune of
          # superseded current-year partials too.
          git add -A data/snapshots data/feed data/radar data/gaps data/last_run.txt docs/data config/spine.json
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Weekly update $(date -u +%Y-%m-%d)"
            # Survive a manual commit racing the cron, then publish.
            git pull --rebase --autostash origin main
            git push
          fi

      # Fail loud: if anything above failed, open an issue so the owner hears about it
      # in their inbox. The last good site stays live because nothing partial was committed.
      - name: Open an issue if the run failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass run-context values through env, not inline ${{ }}, so the shell never re-parses
          # them as expressions. Harmless here (these three are fixed/integer), but it keeps the
          # step injection-proof if a future edit ever drops a github.event.* field into the body.
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Don't pile up a new issue every Monday during a persistent outage: reuse the open one.
          open=$(gh issue list --state open --search "Weekly update failed in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$open" -gt 0 ]; then
            echo "An open failure issue already exists; not filing another."
            exit 0
          fi
          gh issue create \
            --title "Weekly update failed on $(date -u +%Y-%m-%d)" \
            --body "The scheduled update failed. Logs: $SERVER_URL/$REPO/actions/runs/$RUN_ID . Most likely the OPENALEX_API_KEY secret is missing or expired (get a new one at https://openalex.org/settings/api), or OpenAlex changed its API. The previously published site is still live; no bad data was written." \
            || echo "Could not open an issue"
